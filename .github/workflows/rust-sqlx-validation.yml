name: Rust SQLx Validation

# Validates every sqlx::query! macro in vantro-automation-rs against a real
# Postgres schema using an ephemeral CI database. No production credentials
# are used. The schema applied is db/sqlx-test-schema.sql -- a minimal
# standalone DDL maintained separately from the production migrations.
#
# What this workflow proves when green:
#   - Every sqlx::query! macro resolves against the expected table/column types.
#   - cargo sqlx prepare --workspace generates a valid .sqlx/ offline cache.
#   - The vantro-automation-rs server feature compiles against that cache.
#   - The .sqlx/ artifact is uploaded for human review and commit.
#
# What this workflow does NOT do:
#   - Does NOT connect to the production Supabase database.
#   - Does NOT commit .sqlx/ automatically. A human must download the artifact,
#     review it, and commit it as 'chore: add SQLx offline cache'.
#   - Does NOT enable RUST_AUTOMATION_API_ENABLED.
#   - Does NOT deploy anything.
#   - Does NOT run live harness or integration tests against real data.
#
# After .sqlx/ is committed, the verify-server-feature-build job in
# rust-automation-ci.yml will activate automatically (it is gated on
# hashFiles('.sqlx/**') != '').

on: [push, pull_request]

permissions:
  contents: read

jobs:
  sqlx-validate-rust-server:
    name: SQLx prepare + server-feature build (ephemeral Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       vantro_sqlx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd   "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout  5s
          --health-retries  5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vantro_sqlx_test
      SQLX_OFFLINE: "false"
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: short

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Override workspace cargo target for Linux runner
        # The committed .cargo/config.toml pins target = x86_64-pc-windows-gnu.
        # On Linux CI the native host triple must be used.
        run: |
          printf '# Overridden in CI -- Linux host target.\n' > .cargo/config.toml

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-sqlx-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-sqlx-${{ runner.os }}-

      - name: Cache sqlx-cli binary
        id: cache-sqlx-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install sqlx-cli (if not cached)
        if: steps.cache-sqlx-cli.outputs.cache-hit != 'true'
        # No --locked: sqlx-cli is not in the workspace Cargo.lock.
        # No version pin: the sqlx library (0.8.x) is compatible with
        # the latest sqlx-cli 0.8.x for the prepare command.
        run: |
          cargo install sqlx-cli \
            --no-default-features \
            --features rustls,postgres

      - name: Wait for Postgres to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "waiting for postgres..."
            sleep 2
          done
          echo "postgres is ready"

      - name: Apply SQLx test schema
        # This applies db/sqlx-test-schema.sql -- a minimal CI-only schema.
        # It does NOT use production migrations or the full supabase-schema.sql.
        # See db/sqlx-test-schema.sql for the rationale and column inventory.
        run: |
          psql "$DATABASE_URL" -f db/sqlx-test-schema.sql
          echo "schema applied"

      - name: Verify schema tables exist
        # Belt-and-suspenders: confirm every table the Rust queries use was created.
        run: |
          TABLES="users customers invoices purchases products ai_actions promises call_logs"
          for t in $TABLES; do
            COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_name='$t' AND table_schema='public';" | tr -d ' ')
            if [ "$COUNT" != "1" ]; then
              echo "MISSING TABLE: $t"
              exit 1
            fi
            echo "  table $t: OK"
          done

      - name: Pre-check server feature compiles (surfaces all errors before sqlx prepare)
        # cargo sqlx prepare runs an internal cargo check and gives truncated output.
        # This step runs cargo check independently first with full output, so all
        # compile errors surface as named annotations before sqlx prepare hides them.
        # If this step fails, sqlx prepare would also fail -- fix these errors first.
        shell: bash
        env:
          CARGO_TERM_COLOR: never   # disable ANSI codes so grep/annotations work
        run: |
          set +e
          cargo check --features server -p vantro-automation-rs \
            --message-format=short 2>&1 | tee /tmp/cargo-check-server.log
          EXIT=${PIPESTATUS[0]}
          echo "cargo-check-server-exit=$EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== server-feature compile errors ==="
            grep -E "^error|^warning\[" /tmp/cargo-check-server.log | head -30 | while IFS= read -r line; do
              echo "::error title=server-compile::${line}"
            done
            echo "=== full output ==="
            cat /tmp/cargo-check-server.log
          fi
          exit $EXIT

      - name: Force-clean vantro-automation-rs before prepare
        # CRITICAL for sqlx prepare correctness.
        # cargo sqlx prepare only writes query-*.json when the query! macros
        # actually RE-EXPAND during compilation. If the crate is already
        # compiled (warm target/ from the cache restore, or from the step 12
        # pre-check), cargo reports "up-to-date", the macros do not run, and
        # prepare produces an EMPTY .sqlx/ while still exiting 0. Diagnostic
        # run 6b9e261 proved exactly this: ".sqlx exists but contains zero
        # query-*.json files after prepare".
        # cargo clean -p forces a fresh recompile of just this crate during
        # the next prepare, so the macros run and write the cache.
        run: |
          cargo clean -p vantro-automation-rs
          echo "cleaned vantro-automation-rs build artifacts to force macro re-expansion"

      - name: cargo sqlx prepare --workspace (generates .sqlx/ cache)
        # Workspace prepare. `cargo sqlx prepare` does NOT accept -p directly
        # (it errors "unexpected argument '-p'"); package/cargo selectors must
        # go AFTER `--`. --workspace is a valid sqlx flag and writes the merged
        # .sqlx/ at the workspace root -- exactly where the offline build (step
        # 16) looks. cortex-core has no sqlx macros, so the workspace prepare
        # only produces cache entries for vantro-automation-rs.
        #
        # The preceding "Force-clean vantro-automation-rs" step is what makes
        # this actually populate the cache: it guarantees the query! macros
        # re-expand during this prepare's compile so query-*.json files are
        # written. --features server enables the bin (required-features) and
        # its db::queries module so all 8 queries are introspected.
        shell: bash
        run: |
          set +e
          cargo sqlx prepare --workspace -- --features server 2>&1 | tee /tmp/sqlx-prepare.log
          EXIT=${PIPESTATUS[0]}
          echo "sqlx-prepare-exit=$EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== last 60 lines of sqlx prepare output ==="
            tail -60 /tmp/sqlx-prepare.log
            # Surface key error lines as annotations
            grep -E "^error|^thread|panicked|FAILED|could not|missing|no such" /tmp/sqlx-prepare.log | head -10 \
              | while IFS= read -r line; do
                  echo "::error title=sqlx-prepare::${line}"
                done
            # Also try just the last 5 non-blank lines as a fallback
            tail -20 /tmp/sqlx-prepare.log | grep -v '^$' | tail -5 \
              | while IFS= read -r line; do
                  echo "::warning title=sqlx-tail::${line}"
                done
          fi
          exit $EXIT

      - name: Verify .sqlx/ was generated
        run: |
          if [ ! -d .sqlx ]; then
            echo "ERROR: .sqlx/ directory was not created by cargo sqlx prepare"
            exit 1
          fi
          echo "=== .sqlx/ contents ==="
          find .sqlx -type f | sort
          echo "=== file count ==="
          find .sqlx -type f | wc -l

      - name: Diagnose .sqlx cache before offline build
        # DIAGNOSTIC ONLY. Emits the .sqlx inventory as GitHub annotations
        # (::error / ::notice) so the query-file count is visible via the
        # Actions API even when this step passes. This disambiguates:
        #   A) .sqlx exists but cargo sqlx prepare wrote zero query-*.json, vs
        #   B) query files exist but the offline build cannot locate them.
        shell: bash
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== cargo workspace_root ==="
          if command -v jq >/dev/null 2>&1; then
            cargo metadata --format-version=1 --no-deps | jq -r '.workspace_root'
          else
            echo "jq not available; printing raw metadata workspace_root field"
            cargo metadata --format-version=1 --no-deps | grep -o '"workspace_root":"[^"]*"' | head -1
          fi
          echo "=== ls -la .sqlx ==="
          ls -la .sqlx || true
          echo "=== all files in .sqlx (maxdepth 1) ==="
          find .sqlx -maxdepth 1 -type f -print | sort || true
          echo "=== query-*.json count ==="
          QCOUNT=$(find .sqlx -maxdepth 1 -type f -name "query-*.json" | wc -l | tr -d ' ')
          echo "query_json_count=$QCOUNT"
          echo "=== first 20 query-*.json filenames ==="
          find .sqlx -maxdepth 1 -type f -name "query-*.json" | sort | head -20
          # Surface the verdict as an annotation visible via the API.
          if [ "$QCOUNT" = "0" ]; then
            echo "::error title=SQLx cache empty::.sqlx exists but contains zero query-*.json files after prepare"
          else
            echo "::notice title=SQLx cache generated::Found $QCOUNT query cache files in .sqlx"
            # Also emit each filename as a notice so they are visible via the API.
            find .sqlx -maxdepth 1 -type f -name "query-*.json" -exec basename {} \; | sort | head -20 \
              | while IFS= read -r fn; do
                  echo "::notice title=sqlx-cache-file::${fn}"
                done
          fi

      - name: cargo build --profile ci-release --features server (offline)
        # Offline proof: compile the Axum server binary against the .sqlx/
        # cache generated by Step 13 (cargo sqlx prepare).
        # SQLX_OFFLINE=true -- kept; this is the production-build contract.
        # SQLX_OFFLINE_DIR  -- explicitly set to ${{ github.workspace }}/.sqlx
        #   so sqlx does not have to walk the filesystem to find the cache.
        #   Without this, sqlx walks from the crate root upward, which in a
        #   workspace may not find the workspace-root .sqlx/ correctly.
        shell: bash
        env:
          SQLX_OFFLINE: "true"
          SQLX_OFFLINE_DIR: ${{ github.workspace }}/.sqlx
          CARGO_TERM_COLOR: never
        run: |
          echo "SQLX_OFFLINE=$SQLX_OFFLINE"
          echo "SQLX_OFFLINE_DIR=$SQLX_OFFLINE_DIR"
          set +e
          cargo build \
            --profile ci-release \
            -p vantro-automation-rs \
            --features server \
            --message-format=short 2>&1 | tee /tmp/cargo-build.log
          EXIT=${PIPESTATUS[0]}
          echo "cargo-build-exit=$EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== build errors ==="
            grep -E "^error|^warning\[|error:|undefined reference|linker|cannot find|SQLX_OFFLINE" \
              /tmp/cargo-build.log | head -30 \
              | while IFS= read -r line; do
                  echo "::error title=ci-build::${line}"
                done
            echo "=== full output ==="
            cat /tmp/cargo-build.log
          fi
          exit $EXIT

      - name: Upload .sqlx/ as debug artifact (always)
        # DIAGNOSTIC: upload the generated cache regardless of whether the
        # offline build step passed or failed, so we can inspect exactly what
        # cargo sqlx prepare produced even when step 16 fails. This is separate
        # from the production "sqlx-offline-cache" artifact below, which only
        # uploads on full success.
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sqlx-debug-cache
          path: .sqlx/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload .sqlx/ as artifact
        # Upload the generated offline cache for human review.
        # A developer should:
        #   1. Download this artifact from the CI run.
        #   2. Unzip and inspect the JSON query metadata files.
        #   3. Commit the .sqlx/ directory as:
        #        chore: add SQLx offline cache for Rust automation
        #   4. After that commit, the verify-server-feature-build job in
        #      rust-automation-ci.yml will activate automatically.
        # See docs/rust-sqlx-validation.md for the full process.
        uses: actions/upload-artifact@v4
        with:
          name: sqlx-offline-cache
          path: .sqlx/
          retention-days: 14
          if-no-files-found: error
