---
name: Node — Rust fallback matrix + backend verification

on: [push, pull_request]

permissions:
  contents: read

jobs:
  node-fallback-gate:
    name: "Node: rust fallback (8 cases) + check + cortex"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install Node deps
        run: npm ci --omit=dev

      - name: Rust fallback matrix (8 cases — must all pass)
        run: npm run test:rust-fallback

      - name: Server syntax check
        run: npm run check

      - name: Cortex harness static (no DB)
        run: npm run cortex:test

      # Diagnostics: on a cortex failure, surface the exact failing scenario/assertion.
      # Static-mode reports contain no secrets (no DB/token); values are redacted defensively.
      - name: Cortex report (diagnostics on failure)
        if: failure()
        run: |
          red() { sed -E 's#eyJ[A-Za-z0-9_.-]{20,}#<JWT>#g; s#postgres(ql)?://[^ "]*#<REDACTED>#g'; }
          echo "===== cortex-lab/reports/*.md ====="
          for f in cortex-lab/reports/*.md; do [ -e "$f" ] || continue; echo "----- $f -----"; red < "$f"; echo; done
          echo "===== cortex-lab/results/latest.json ====="
          if [ -f cortex-lab/results/latest.json ]; then red < cortex-lab/results/latest.json; else echo "(no latest.json)"; fi

      - name: Upload cortex debug reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-policy-safety-debug
          path: |
            cortex-lab/reports/
            cortex-lab/results/
          if-no-files-found: warn
          retention-days: 7

      - name: Secret scan
        run: npm run security:secrets
---
