name: Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Syntax check
      run: npm run check

    - name: Secret Scan
      run: npm run security:secrets

    # Recommendation for repo owners:
    # 1. Enable GitHub Secret Scanning
    # 2. Enable GitHub Push Protection
    # 3. Enable Dependabot Alerts
    # 4. Enforce branch protection rules requiring this workflow to pass.
