name: Rust Automation CI

# Linux CI gate for the Vantro Automation RS + Cortex Core RS workspace.
# Verifies: format, type-check, unit tests, integration tests
# (including the FIR policy-guard regression) and the offline Cortex
# harness. Runs on every push and every pull request, on every branch.
#
# Jobs:
#   - verify-pure-rust              : fmt + check + unit/integration tests
#   - verify-cortex-harness-static  : offline Cortex harness (no DB)
#   - verify-server-feature-build   : offline server-feature build using the
#       committed .sqlx/ cache (SQLX_OFFLINE=true). Gated on the cache being
#       present; activated once .sqlx/ was committed.
#
# Intentional non-goals (do NOT silently expand into these):
#   - live harness (cortex-lab --mode=live, --mode=dry-run). Those need a
#     non-prod database and seeded tenants -- separate, future commit.
#   - any use of production secrets. No DATABASE_URL, JWT_SECRET, or
#     Supabase key is referenced in this workflow. The server-feature build
#     runs fully offline (SQLX_OFFLINE=true) against the committed .sqlx/
#     metadata -- it never connects to any database.

on: [push, pull_request]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  verify-pure-rust:
    name: cargo fmt / check / test (pure-Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Override workspace cargo target for Linux runner
        # The committed .cargo/config.toml pins target = x86_64-pc-windows-gnu
        # for Windows developer machines. On Linux CI we want the host triple.
        # Replace the file inside the runner checkout only; the committed
        # version on disk is untouched.
        run: |
          printf '# Overridden in CI -- Linux host target.\n' > .cargo/config.toml
          cat .cargo/config.toml

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-pure-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-pure-${{ runner.os }}-

      - name: rustc + cargo versions
        run: rustc --version && cargo --version

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check

      - name: cargo check --workspace (no features)
        run: cargo check --workspace --locked

      - name: cargo test --workspace --lib
        shell: bash
        run: |
          set +e
          cargo test --workspace --lib --locked --no-fail-fast -- --test-threads=1 2>&1 | tee /tmp/test-lib.log
          EXIT=${PIPESTATUS[0]}
          echo "cargo-test-lib-exit=$EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== last 30 lines of /tmp/test-lib.log ==="
            tail -30 /tmp/test-lib.log
            # Surface compact failure-identifying lines as annotations.
            # 1) Cargo "failures:" block -- names of failing tests.
            awk '/^failures:$/{f=1;next} f && /^test result:/{f=0} f && /^    [^ ]/{print}' /tmp/test-lib.log \
              | head -10 \
              | while IFS= read -r name; do
                  echo "::error title=test-fail::${name## }"
                done
            # 2) rustc compile errors.
            grep -E "^error(\[E[0-9]+\])?:" /tmp/test-lib.log | head -5 \
              | while IFS= read -r line; do
                  echo "::error title=compile::$line"
                done
            # 3) Final "test result:" tally.
            grep "^test result:" /tmp/test-lib.log | tail -3 \
              | while IFS= read -r line; do
                  echo "::warning title=tally::$line"
                done
            # 4) Last resort: if NONE of the above matched, surface tail.
            HAS_FAIL=$(awk '/^failures:$/{f=1;next} f && /^test result:/{f=0} f && /^    [^ ]/{print}' /tmp/test-lib.log | wc -l)
            HAS_COMPILE=$(grep -cE "^error(\[E[0-9]+\])?:" /tmp/test-lib.log || true)
            HAS_TALLY=$(grep -c "^test result:" /tmp/test-lib.log || true)
            if [ "$HAS_FAIL" = "0" ] && [ "$HAS_COMPILE" = "0" ] && [ "$HAS_TALLY" = "0" ]; then
              # Probably exited before printing any test output (e.g. linker error
              # or a crate build failure with non-standard output). Emit the last
              # 5 non-blank lines as annotations.
              tail -50 /tmp/test-lib.log | grep -v '^$' | tail -5 \
                | while IFS= read -r line; do
                    echo "::error title=unknown-fail::$line"
                  done
            fi
          fi
          exit $EXIT

      - name: cargo test --workspace --tests
        # Integration tests under each crate's tests/ directory, including
        # vantro-automation-rs/tests/policy_guard_fir_regression.rs.
        shell: bash
        run: |
          set +e
          cargo test --workspace --tests --locked --no-fail-fast -- --test-threads=1 2>&1 | tee /tmp/test-tests.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "=== FAILED tests (integration) ==="
            grep -E "^test .* \.\.\. FAILED$" /tmp/test-tests.log | while IFS= read -r line; do
              name=$(echo "$line" | sed 's/^test \(.*\) \.\.\. FAILED$/\1/')
              echo "::error title=integration test failed::$name"
            done
            echo ""
            echo "=== panic / assertion context ==="
            grep -nE "(^---- .* stdout|^thread .* panicked at|assertion .*failed|^test result|^failures:|^error\[E|^FAILED)" /tmp/test-tests.log | head -80
          fi
          exit $EXIT

      - name: Confirm policy_guard_fir_regression actually ran
        # Re-invoke the specific integration test target by name with
        # --nocapture so individual test names appear in CI logs.
        run: cargo test --locked -p vantro-automation-rs --test policy_guard_fir_regression -- --nocapture --test-threads=1

  verify-cortex-harness-static:
    name: cortex-lab static (no DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify-pure-rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Node deps
        run: npm ci --omit=dev

      - name: cortex-lab static mode
        run: npm run cortex:test --silent

  verify-server-feature-build:
    name: server-feature offline build (SQLX_OFFLINE=true)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-pure-rust
    # Activates only when the committed .sqlx/ offline cache exists. Before
    # the cache was committed this job was absent; it is now a permanent gate.
    # If .sqlx/ is ever deleted, this job auto-skips rather than failing.
    if: ${{ hashFiles('.sqlx/**') != '' }}
    env:
      # Offline build: read query metadata from the committed .sqlx/ cache.
      # No database connection at build time. This mirrors the Railway
      # production build contract exactly.
      SQLX_OFFLINE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Override workspace cargo target for Linux runner
        # The committed .cargo/config.toml pins x86_64-pc-windows-gnu for
        # Windows dev machines; on Linux CI use the host triple. Only the
        # ephemeral runner checkout is modified.
        run: |
          printf '# Overridden in CI -- Linux host target.\n' > .cargo/config.toml

      - name: Cache cargo (server feature)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-server-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.sqlx/**') }}
          restore-keys: |
            rust-server-${{ runner.os }}-

      - name: cargo build --features server (offline, ci-release profile)
        # Proves the Axum server binary compiles against the committed .sqlx/
        # cache with SQLX_OFFLINE=true -- the exact contract Railway uses.
        # Uses [profile.ci-release] (release minus LTO) for reasonable CI time.
        shell: bash
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo build --profile ci-release --features server \
            -p vantro-automation-rs --message-format=short 2>&1 | tee /tmp/server-build.log
          EXIT=${PIPESTATUS[0]}
          echo "server-build-exit=$EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "=== build errors ==="
            grep -E "^error|^warning\[|error:|SQLX_OFFLINE|no cached data|linker|cannot find" \
              /tmp/server-build.log | head -30 \
              | while IFS= read -r line; do
                  echo "::error title=server-build::${line}"
                done
            echo "=== full output ==="
            cat /tmp/server-build.log
          fi
          exit $EXIT
