name: Rust Automation CI

# Linux CI gate for the Vantro Automation RS + Cortex Core RS workspace.
# Verifies: format, type-check, unit tests, integration tests
# (including the FIR policy-guard regression) and the offline Cortex
# harness. Runs on every push and every pull request, on every branch.
#
# Intentional non-goals (do NOT silently expand into these):
#   - server-feature build with sqlx::query! macros. That requires either
#     a non-prod DATABASE_URL or a committed .sqlx/ offline cache, neither
#     of which exists today. It is gated by a separate, future workflow
#     commit that lands at the same time as the .sqlx/ cache.
#   - live harness (cortex-lab --mode=live, --mode=dry-run). Those need a
#     non-prod database and seeded tenants — separate, future commit.
#   - any use of production secrets. No DATABASE_URL, JWT_SECRET, or
#     Supabase key is referenced in this workflow.

on: [push, pull_request]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  verify-pure-rust:
    name: cargo fmt / check / test (pure-Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Override workspace cargo target for Linux runner
        # The committed .cargo/config.toml pins target = x86_64-pc-windows-gnu
        # for Windows developer machines. On Linux CI we want the host triple.
        # Replace the file inside the runner checkout only; the committed
        # version on disk is untouched.
        run: |
          printf '# Overridden in CI — Linux host target.\n' > .cargo/config.toml
          cat .cargo/config.toml

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-pure-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-pure-${{ runner.os }}-

      - name: rustc + cargo versions
        run: rustc --version && cargo --version

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check

      - name: cargo check --workspace (no features)
        run: cargo check --workspace --locked

      - name: cargo test --workspace --lib
        shell: bash
        run: |
          set +e
          cargo test --workspace --lib --locked --no-fail-fast -- --test-threads=1 2>&1 | tee /tmp/test-lib.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "=== FAILED tests (lib) ==="
            grep -E "^test .* \.\.\. FAILED$" /tmp/test-lib.log | while IFS= read -r line; do
              name=$(echo "$line" | sed 's/^test \(.*\) \.\.\. FAILED$/\1/')
              echo "::error title=lib test failed::$name"
            done
            echo ""
            echo "=== panic / assertion context ==="
            grep -nE "(^---- .* stdout|^thread .* panicked at|assertion .*failed|^test result|^failures:|^error\[E|^FAILED)" /tmp/test-lib.log | head -80
          fi
          exit $EXIT

      - name: cargo test --workspace --tests
        # Integration tests under each crate's tests/ directory, including
        # vantro-automation-rs/tests/policy_guard_fir_regression.rs.
        shell: bash
        run: |
          set +e
          cargo test --workspace --tests --locked --no-fail-fast -- --test-threads=1 2>&1 | tee /tmp/test-tests.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "=== FAILED tests (integration) ==="
            grep -E "^test .* \.\.\. FAILED$" /tmp/test-tests.log | while IFS= read -r line; do
              name=$(echo "$line" | sed 's/^test \(.*\) \.\.\. FAILED$/\1/')
              echo "::error title=integration test failed::$name"
            done
            echo ""
            echo "=== panic / assertion context ==="
            grep -nE "(^---- .* stdout|^thread .* panicked at|assertion .*failed|^test result|^failures:|^error\[E|^FAILED)" /tmp/test-tests.log | head -80
          fi
          exit $EXIT

      - name: Confirm policy_guard_fir_regression actually ran
        # Re-invoke the specific integration test target by name with
        # --nocapture so individual test names appear in CI logs.
        run: cargo test --locked -p vantro-automation-rs --test policy_guard_fir_regression -- --nocapture --test-threads=1

  verify-cortex-harness-static:
    name: cortex-lab static (no DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify-pure-rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Node deps
        run: npm ci --omit=dev

      - name: cortex-lab static mode
        run: npm run cortex:test --silent
